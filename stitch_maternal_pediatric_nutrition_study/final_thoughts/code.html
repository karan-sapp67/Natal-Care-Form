<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IMPN Study - Closing &amp; Data Capture</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#d2bbff",
                        "surface-container": "#e6eeff",
                        "primary-container": "#4a1d96",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#b794ff",
                        "on-secondary-container": "#6a5a7e",
                        "surface-tint": "#6d46bb",
                        "tertiary-container": "#00453c",
                        "secondary": "#67587b",
                        "surface-container-low": "#eff4ff",
                        "tertiary": "#002d27",
                        "tertiary-fixed-dim": "#7ad7c6",
                        "on-tertiary-fixed": "#00201b",
                        "on-tertiary-fixed-variant": "#005046",
                        "tertiary-fixed": "#96f3e1",
                        "inverse-surface": "#27313f",
                        "surface-bright": "#f8f9ff",
                        "on-tertiary-container": "#59b7a6",
                        "surface": "#f8f9ff",
                        "primary": "#320075",
                        "surface-dim": "#d0dbed",
                        "on-primary-fixed-variant": "#552ba1",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#eaf1ff",
                        "on-background": "#121c2a",
                        "secondary-fixed-dim": "#d2bfe8",
                        "surface-container-high": "#dee9fc",
                        "on-surface": "#121c2a",
                        "error": "#ba1a1a",
                        "secondary-container": "#e9d5ff",
                        "primary-fixed": "#eaddff",
                        "on-secondary-fixed": "#221534",
                        "outline-variant": "#ccc3d4",
                        "secondary-fixed": "#eddcff",
                        "on-secondary-fixed-variant": "#4f4062",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#25005a",
                        "inverse-primary": "#d2bbff",
                        "surface-container-highest": "#d9e3f6",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#d9e3f6",
                        "outline": "#7b7484",
                        "background": "#f8f9ff",
                        "on-surface-variant": "#4a4452"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-margin": "48px",
                        "gutter": "16px",
                        "card-gap": "20px",
                        "container-padding": "24px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "display-lg": ["Manrope"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Manrope"],
                        "interactive": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "interactive": ["16px", { "lineHeight": "20px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-gutter h-16 bg-surface dark:bg-surface-dim border-b border-outline-variant/10 dark:border-outline-variant/5 shadow-sm shadow-primary/5 docked full-width top-0 z-40 max-w-[720px] mx-auto">
<button aria-label="Go back" class="w-12 h-12 flex items-center justify-center text-primary dark:text-primary-fixed-dim hover:bg-surface-container-high transition-colors rounded-full">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary dark:text-primary-fixed-dim">IMPN Study</h1>
<button aria-label="Help" class="w-12 h-12 flex items-center justify-center text-primary dark:text-primary-fixed-dim hover:bg-surface-container-high transition-colors rounded-full">
<span class="material-symbols-outlined text-2xl">help</span>
</button>
</header>
<!-- Progress Bar (100%) -->
<div class="w-full max-w-[720px] h-1 bg-surface-container-high">
<div class="h-full bg-tertiary-container w-full transition-all duration-500 ease-in-out"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[720px] px-container-padding py-section-margin flex flex-col gap-section-margin pb-32">
<div class="flex flex-col gap-6 text-center mb-4">
<span class="material-symbols-outlined text-display-lg font-display-lg text-primary mx-auto opacity-80" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<h2 class="text-headline-md font-headline-md text-primary">Final Details</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant">Just a couple more questions to complete your participation.</p>
</div>
<!-- Form Section -->
<section class="flex flex-col gap-card-gap">
<!-- Numeric Input for Pincode -->
<div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_8px_30px_rgba(50,0,117,0.04)] border border-outline-variant/10 flex flex-col gap-4">
<label class="text-body-md font-body-md text-on-surface font-medium flex items-center gap-2" for="pincode">
<span class="material-symbols-outlined text-primary text-xl">location_on</span>
                    Please enter your Pincode
                </label>
<div class="relative">
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant text-body-lg font-body-lg text-on-surface px-4 py-3 rounded-t-lg focus:outline-none focus:border-primary focus:bg-surface-container-high transition-all placeholder:text-outline/50" id="pincode" placeholder="e.g., 110001" type="number"/>
</div>
</div>
<!-- Open-ended Input -->
<div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_8px_30px_rgba(50,0,117,0.04)] border border-outline-variant/10 flex flex-col gap-4">
<label class="text-body-md font-body-md text-on-surface font-medium flex items-start gap-2" for="nutrition-feedback">
<span class="material-symbols-outlined text-primary text-xl mt-0.5">chat_bubble</span>
                    What kind of nutrition support do you feel is still missing for mothers and children?
                </label>
<textarea class="w-full bg-surface-container-low border-b-2 border-outline-variant text-body-lg font-body-lg text-on-surface px-4 py-3 rounded-t-lg focus:outline-none focus:border-primary focus:bg-surface-container-high transition-all resize-none placeholder:text-outline/50" id="nutrition-feedback" placeholder="Share your thoughts here..." rows="4"></textarea>
</div>
</section>
<!-- Final Message -->
<div class="mt-8 p-6 bg-secondary-container/30 rounded-xl text-center flex flex-col items-center gap-4">
<span class="material-symbols-outlined text-secondary text-3xl" style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
<p class="text-body-lg font-body-lg text-secondary font-medium">
                 Thank you for your time and contribution to maternal and pediatric health in India.
             </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center bg-surface/80 backdrop-blur-md border-t border-outline-variant/10 shadow-[0_-8px_30px_rgba(50,0,117,0.04)]">
<div class="flex justify-between items-center w-full max-w-[720px] px-gutter py-4 gap-4">
<button class="flex items-center justify-center text-primary dark:text-primary-fixed-dim border border-primary/20 h-14 px-8 rounded-full hover:bg-surface-container-high transition-colors group flex-1 md:flex-none">
<span class="material-symbols-outlined mr-2 group-hover:-translate-x-1 transition-transform">chevron_left</span>
<span class="text-interactive font-interactive">Back</span>
</button>
<button class="flex items-center justify-center bg-primary dark:bg-primary-fixed-dim text-on-primary dark:text-on-primary-fixed h-14 px-8 rounded-full shadow-md hover:brightness-110 transition-all active:scale-95 duration-150 group flex-1 md:flex-none">
<span class="text-interactive font-interactive font-medium">Submit</span>
<span class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform">check</span>
</button>
</div>
</nav>
</body></html>
