<!DOCTYPE html>

<html lang="en"><head>

<title>Mother Awareness - IMPN Study</title>

                    "fontFamily": {

                        "display-lg": ["Manrope"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Manrope"],
                        "interactive": ["Inter"]

                    "fontSize": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-shadow {
            box-shadow: 0 8px 30px rgba(50, 0, 117, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface sticky top-0 z-50 flex justify-between items-center w-full px-gutter h-16 border-b border-outline-variant/10 shadow-sm shadow-primary/5">
<button class="text-primary hover:bg-surface-container-high transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary">IMPN Study</h1>
<button class="text-primary hover:bg-surface-container-high transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">help</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-[720px] mx-auto px-container-padding pt-6 pb-[120px] flex flex-col gap-section-margin">
<!-- Progress Bar -->
<div class="w-full flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<span class="text-label-caps font-label-caps text-on-surface-variant uppercase">Phase 2: Insights</span>
<span class="text-label-caps font-label-caps text-primary uppercase">40%</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-on-tertiary-container rounded-full w-[40%] transition-all duration-500 ease-in-out"></div>
</div>
</div>
<!-- Question 1: Single Choice -->
<section class="flex flex-col gap-6">
<h2 class="text-headline-md font-headline-md text-on-background">When your child needs nutritional support, where do you look first?</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-card-gap">
<!-- Option 1: Selected State -->
<label class="group relative flex items-center p-6 bg-secondary-container/30 border-2 border-primary rounded-xl cursor-pointer soft-shadow transition-all">
<input checked="" class="sr-only" name="source" type="radio"/>
<div class="flex items-center gap-4 w-full">
<div class="flex-shrink-0 w-12 h-12 bg-surface-container-lowest rounded-full flex items-center justify-center text-primary shadow-sm">
<span class="material-symbols-outlined icon-fill">medical_services</span>
</div>
<span class="text-body-lg font-body-lg font-medium text-on-background flex-grow">Doctor consultation</span>
<div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center bg-primary">
<div class="w-2 h-2 rounded-full bg-surface-container-lowest"></div>
</div>
</div>
</label>
<!-- Option 2 -->
<label class="group relative flex items-center p-6 bg-surface-container-lowest border border-outline-variant/30 rounded-xl cursor-pointer soft-shadow hover:bg-surface-container-low transition-all hover:border-outline-variant">
<input class="sr-only" name="source" type="radio"/>
<div class="flex items-center gap-4 w-full">
<div class="flex-shrink-0 w-12 h-12 bg-surface-container-high rounded-full flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">home_health</span>
</div>
<span class="text-body-lg font-body-lg text-on-surface-variant group-hover:text-on-background transition-colors flex-grow">Home remedies/Elder advice</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center"></div>
</div>
</label>
<!-- Option 3 -->
<label class="group relative flex items-center p-6 bg-surface-container-lowest border border-outline-variant/30 rounded-xl cursor-pointer soft-shadow hover:bg-surface-container-low transition-all hover:border-outline-variant">
<input class="sr-only" name="source" type="radio"/>
<div class="flex items-center gap-4 w-full">
<div class="flex-shrink-0 w-12 h-12 bg-surface-container-high rounded-full flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">travel_explore</span>
</div>
<span class="text-body-lg font-body-lg text-on-surface-variant group-hover:text-on-background transition-colors flex-grow">Online research/Social Media</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center"></div>
</div>
</label>
<!-- Option 4 -->
<label class="group relative flex items-center p-6 bg-surface-container-lowest border border-outline-variant/30 rounded-xl cursor-pointer soft-shadow hover:bg-surface-container-low transition-all hover:border-outline-variant">
<input class="sr-only" name="source" type="radio"/>
<div class="flex items-center gap-4 w-full">
<div class="flex-shrink-0 w-12 h-12 bg-surface-container-high rounded-full flex items-center justify-center text-on-surface-variant group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">local_pharmacy</span>
</div>
<span class="text-body-lg font-body-lg text-on-surface-variant group-hover:text-on-background transition-colors flex-grow">Pharmacy suggestion</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center"></div>
</div>
</label>
</div>
</section>
<!-- Question 2: Multiple Choice -->
<section class="flex flex-col gap-6">
<div class="flex flex-col gap-2">
<h2 class="text-headline-md font-headline-md text-on-background">What are your biggest concerns with existing supplements?</h2>
<p class="text-body-md font-body-md text-on-surface-variant">(Select all that apply)</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-card-gap">
<!-- Option A -->
<label class="group relative flex items-center p-6 bg-surface-container-lowest border border-outline-variant/30 rounded-xl cursor-pointer soft-shadow hover:bg-surface-container-low transition-all hover:border-outline-variant">
<input class="sr-only" type="checkbox"/>
<div class="flex items-center gap-4 w-full">
<div class="w-6 h-6 rounded border-2 border-outline-variant flex items-center justify-center group-hover:border-primary transition-colors"></div>
<span class="text-body-lg font-body-lg text-on-surface-variant group-hover:text-on-background transition-colors flex-grow">Taste/Flavor</span>
</div>
</label>
<!-- Option B -->
<label class="group relative flex items-center p-6 bg-surface-container-lowest border border-outline-variant/30 rounded-xl cursor-pointer soft-shadow hover:bg-surface-container-low transition-all hover:border-outline-variant">
<input class="sr-only" type="checkbox"/>
<div class="flex items-center gap-4 w-full">
<div class="w-6 h-6 rounded border-2 border-outline-variant flex items-center justify-center group-hover:border-primary transition-colors"></div>
<span class="text-body-lg font-body-lg text-on-surface-variant group-hover:text-on-background transition-colors flex-grow">Digestive discomfort (nausea/constipation)</span>
</div>
</label>
<!-- Option C -->
<label class="group relative flex items-center p-6 bg-surface-container-lowest border border-outline-variant/30 rounded-xl cursor-pointer soft-shadow hover:bg-surface-container-low transition-all hover:border-outline-variant">
<input class="sr-only" type="checkbox"/>
<div class="flex items-center gap-4 w-full">
<div class="w-6 h-6 rounded border-2 border-outline-variant flex items-center justify-center group-hover:border-primary transition-colors"></div>
<span class="text-body-lg font-body-lg text-on-surface-variant group-hover:text-on-background transition-colors flex-grow">Cost</span>
</div>
</label>
<!-- Option D: Selected State Example -->
<label class="group relative flex items-center p-6 bg-secondary-container/10 border border-primary/50 rounded-xl cursor-pointer soft-shadow transition-all">
<input checked="" class="sr-only" type="checkbox"/>
<div class="flex items-center gap-4 w-full">
<div class="w-6 h-6 rounded border-2 border-primary bg-primary flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-[18px]">check</span>
</div>
<span class="text-body-lg font-body-lg font-medium text-on-background flex-grow">Sugar content</span>
</div>
</label>
</div>
</section>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-gutter py-4 gap-4 bg-surface/80 backdrop-blur-md border-t border-outline-variant/10 shadow-[0_-8px_30px_rgba(50,0,117,0.04)]">

<span class="material-symbols-outlined mr-2">chevron_left</span>

        </button>
<button class="flex items-center justify-center bg-primary text-on-primary h-14 px-8 rounded-full shadow-md hover:brightness-110 transition-all font-interactive text-interactive ml-auto">
